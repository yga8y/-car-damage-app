name: car_damage_app
description: AI车辆定损APP

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # 相机和图片
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  
  # 网络请求
  http: ^1.2.0
  dio: ^5.4.0
  
  # 状态管理
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 文件和路径
  path_provider: ^2.1.2
  path: ^1.8.3
  
  # 权限管理
  permission_handler: ^11.2.0
  
  # PDF和分享
  flutter_pdfview: ^1.3.2
  share_plus: ^7.2.2
  
  # 图片处理
  cached_network_image: ^3.3.1
  image: ^4.1.3
  
  # 工具
  intl: ^0.19.0
  uuid: ^4.3.3
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  
  # UI组件
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.otf
        - asset: assets/fonts/NotoSansSC-Bold.otf
          weight: 700
